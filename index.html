<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flat-Link Snap Rig</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; padding: 15px; z-index: 10; }
        button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; font-weight: bold; }
        .active { background: #3b82f6 !important; border-color: #fff; }
        .snap-on { color: #4ade80; border-color: #4ade80; }
        #viewer { flex-grow: 1; position: relative; }
        .hint { font-size: 11px; color: #888; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Rig Controller</h3>
    <button id="drawBtn" onclick="toggleDraw()">Start Drawing</button>
    <button id="snapBtn" onclick="toggleSnap()" class="snap-on">Snap: ON</button>
    <button id="moveBtn" onclick="setMode('translate')" class="active">Move Joints</button>
    <button style="background:#4b1a1a" onclick="deleteJoint()">Delete Selected</button>
    
    <div class="hint">
        • <b>Snap</b>: Release a joint near another to merge their positions.<br>
        • <b>Bones</b>: Clicking a bone selects its start joint.<br>
        • <b>Flat Logic</b>: Moving one joint stretches the bone without moving the neighbor.
    </div>
</div>
<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawing = false, isSnapEnabled = true, lastJoint = null, selectedJoint = null;
    const SNAP_THRESHOLD = 0.6; 

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 260) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 260, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5), new THREE.DirectionalLight(0xffffff, 1).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        // --- LIVE BONE UPDATE ---
        transform.addEventListener('change', updateAllBones);

        transform.addEventListener('dragging-changed', (e) => {
            orbit.enabled = !e.value;
            // When dragging stops, try to snap
            if (!e.value && isSnapEnabled && selectedJoint) {
                trySnap(selectedJoint);
            }
        });

        scene.add(transform);
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        animate();
    }

    function trySnap(dragged) {
        let nearest = null;
        let minDist = SNAP_THRESHOLD;

        scene.traverse(obj => {
            if (obj.userData.isJoint && obj !== dragged) {
                const dist = dragged.position.distanceTo(obj.position);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = obj;
                }
            }
        });

        if (nearest) {
            // Hard snap the position
            dragged.position.copy(nearest.position);
            updateAllBones();
            
            // Visual feedback: brief flash or log
            console.log("Snapped to " + nearest.uuid);
        }
    }

    function onPointerDown(e) {
        if (isDrawing) {
            createAirJoint(e);
            return;
        }

        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0) {
            const hit = hits.find(h => h.object.userData.isJoint || h.object.userData.isBone);
            if (hit) {
                selectedJoint = hit.object.userData.isBone ? hit.object.userData.parentJoint : hit.object;
                transform.attach(selectedJoint);
            }
        } else {
            transform.detach();
            selectedJoint = null;
        }
    }

    function createAirJoint(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);

        let pos = new THREE.Vector3();
        if (lastJoint) {
            const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).negate(), lastJoint.position);
            ray.ray.intersectPlane(plane, pos);
        } else {
            pos = ray.ray.origin.clone().add(ray.ray.direction.clone().multiplyScalar(5));
        }

        const joint = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({color: 0xffffff}));
        joint.position.copy(pos);
        joint.userData.isJoint = true;
        scene.add(joint);

        if (lastJoint) {
            createBone(lastJoint, joint);
        }

        lastJoint = joint;
        updateAllBones();
    }

    function createBone(pJoint, cJoint) {
        const geo = new THREE.CylinderGeometry(0.05, 0.05, 1);
        geo.translate(0, 0.5, 0); 
        const bone = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x3b82f6}));
        bone.userData.isBone = true;
        bone.userData.parentJoint = pJoint;
        bone.userData.childJoint = cJoint;
        scene.add(bone);
    }

    function updateAllBones() {
        scene.traverse(obj => {
            if (obj.userData.isBone) {
                const p = obj.userData.parentJoint;
                const c = obj.userData.childJoint;
                if (!p || !c) return;
                
                const dist = p.position.distanceTo(c.position);
                obj.position.copy(p.position);
                obj.lookAt(c.position);
                obj.rotateX(Math.PI / 2);
                obj.scale.set(1, Math.max(dist, 0.001), 1);
            }
        });
    }

    window.toggleDraw = () => {
        isDrawing = !isDrawing;
        orbit.enabled = !isDrawing;
        if (isDrawing) { lastJoint = null; transform.detach(); }
        document.getElementById('drawBtn').classList.toggle('active', isDrawing);
    };

    window.toggleSnap = () => {
        isSnapEnabled = !isSnapEnabled;
        const btn = document.getElementById('snapBtn');
        btn.innerText = isSnapEnabled ? "Snap: ON" : "Snap: OFF";
        btn.classList.toggle('snap-on', isSnapEnabled);
    };

    window.setMode = (m) => {
        transform.setMode(m);
    };

    window.deleteJoint = () => {
        if (!selectedJoint) return;
        const toDelete = [];
        scene.traverse(obj => {
            if (obj.userData.isBone && (obj.userData.parentJoint === selectedJoint || obj.userData.childJoint === selectedJoint)) {
                toDelete.push(obj);
            }
        });
        toDelete.forEach(b => b.removeFromParent());
        selectedJoint.removeFromParent();
        transform.detach();
        selectedJoint = null;
        updateAllBones();
    };

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
