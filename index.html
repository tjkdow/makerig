<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Rig Tool</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: -apple-system, sans-serif; overflow: hidden; }
        #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel { padding: 15px; border-bottom: 1px solid #333; }
        button { width: 100%; padding: 10px; margin: 4px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; }
        .active-mode { background: #3b82f6 !important; border-color: #fff; }
        
        #hierarchy-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .tree-ul { list-style: none; padding-left: 15px; margin: 5px 0; border-left: 1px solid #444; }
        .tree-li { cursor: pointer; padding: 6px; font-size: 13px; border-radius: 4px; color: #ccc; }
        .tree-selected { background: #3b82f6 !important; color: white; }

        input[type="range"] { width: 100%; margin: 8px 0; accent-color: #3b82f6; }
        label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        #viewer { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <strong>Creation</strong>
        <button id="drawBtn" onclick="toggleDrawMode()">Start Air Drawing</button>
        <div style="display: flex; gap: 4px;">
            <button id="moveBtn" onclick="setGizmo('translate')" class="active-mode">Move</button>
            <button id="rotBtn" onclick="setGizmo('rotate')">Rotate</button>
        </div>
    </div>

    <div id="prop-panel" class="panel" style="display:none;">
        <strong>Bone Settings</strong><br>
        <label>Thickness</label>
        <input type="range" id="thickIn" min="0.05" max="1.5" step="0.01" oninput="updateBone()">
        <label>Length</label>
        <input type="range" id="lengthIn" min="0.1" max="10" step="0.1" oninput="updateBone()">
    </div>

    <div id="hierarchy-container">
        <strong>Bone Stack</strong>
        <div id="tree-root"></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawMode = false;
    let lastBone = null;
    let selectedBone = null;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 260) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 260, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x222222));
        scene.add(new THREE.AmbientLight(0x606060), new THREE.PointLight(0xffffff, 150).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        transform.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transform);

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isDrawMode) { handleAirClick(e); return; }
            
            // Raycast for selection
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if (intersects.length > 0) {
                const hit = intersects.find(i => i.object.userData.isBone);
                if (hit) selectBoneObj(hit.object);
            }
        });

        animate();
    }

    window.setGizmo = (mode) => {
        transform.setMode(mode);
        document.getElementById('moveBtn').classList.toggle('active-mode', mode === 'translate');
        document.getElementById('rotBtn').classList.toggle('active-mode', mode === 'rotate');
    };

    window.toggleDrawMode = () => {
        isDrawMode = !isDrawMode;
        orbit.enabled = !isDrawMode;
        document.getElementById('drawBtn').innerText = isDrawMode ? "Finish" : "Start Drawing";
        document.getElementById('drawBtn').classList.toggle('active-mode', isDrawMode);
        if (isDrawMode) { lastBone = null; transform.detach(); }
        updateUI();
    };

    function handleAirClick(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const pos = camera.position.clone().add(dir.multiplyScalar(10));
        addBone(pos);
    }

    function addBone(pos) {
        // The Bone Object is actually the pivot (Joint) with a Mesh inside it
        const boneGroup = new THREE.Group(); 
        boneGroup.userData.isBone = true;
        boneGroup.userData.name = 'Bone_' + (scene.children.length);

        // Visual Cylinder
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.1, 1, 8), 
            new THREE.MeshStandardMaterial({color: 0x3b82f6})
        );
        mesh.geometry.translate(0, 0.5, 0); // Offset so pivot is at base
        boneGroup.add(mesh);
        boneGroup.userData.mesh = mesh;

        // Visual Joint (Small sphere at pivot)
        const joint = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({color: 0xffffff}));
        boneGroup.add(joint);

        if (!lastBone) {
            boneGroup.position.copy(pos);
            scene.add(boneGroup);
        } else {
            const start = new THREE.Vector3();
            lastBone.getWorldPosition(start);
            const dist = start.distanceTo(pos);

            lastBone.lookAt(pos);
            lastBone.rotateX(Math.PI / 2);
            
            // Set initial length
            mesh.scale.set(1, dist, 1);
            
            boneGroup.position.y = dist;
            lastBone.add(boneGroup);
            boneGroup.rotation.x = -Math.PI / 2; // Reset for next bone
        }
        lastBone = boneGroup;
        updateUI();
    }

    function selectBoneObj(obj) {
        // If user clicked the mesh, we attach to the parent Group (the pivot)
        selectedBone = obj.parent.userData.isBone ? obj.parent : obj;
        transform.attach(selectedBone);
        
        document.getElementById('prop-panel').style.display = 'block';
        const mesh = selectedBone.userData.mesh;
        document.getElementById('thickIn').value = mesh.scale.x;
        document.getElementById('lengthIn').value = mesh.scale.y;
        updateUI();
    }

    window.updateBone = () => {
        if (!selectedBone) return;
        const t = parseFloat(document.getElementById('thickIn').value);
        const l = parseFloat(document.getElementById('lengthIn').value);
        const mesh = selectedBone.userData.mesh;
        
        mesh.scale.set(t, l, t);
        
        // Move all children to the new tip
        selectedBone.children.forEach(c => {
            if (c.userData.isBone) c.position.y = l;
        });
    };

    function updateUI() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        const roots = scene.children.filter(c => c.userData.isBone);
        const ul = document.createElement('ul');
        ul.className = 'tree-ul';
        roots.forEach(r => ul.appendChild(buildTree(r)));
        root.appendChild(ul);
    }

    function buildTree(obj) {
        const li = document.createElement('li');
        li.className = 'tree-li' + (selectedBone === obj ? ' tree-selected' : '');
        li.innerText = "🦴 " + obj.userData.name;
        li.onclick = (e) => { e.stopPropagation(); selectBoneObj(obj); };
        
        const children = obj.children.filter(c => c.userData.isBone);
        if (children.length > 0) {
            const sub = document.createElement('ul');
            sub.className = 'tree-ul';
            children.forEach(c => sub.appendChild(buildTree(c)));
            li.appendChild(sub);
        }
        return li;
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
