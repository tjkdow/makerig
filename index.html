<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rig Maker</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 300px; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; z-index: 10; }
        .panel { padding: 15px; border-bottom: 1px solid #444; }
        button { width: 100%; padding: 8px; margin: 5px 0; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
        button:hover { background: #555; }
        #hierarchy { flex-grow: 1; overflow-y: auto; padding: 15px; }
        ul { list-style: none; padding-left: 15px; cursor: pointer; }
        .selected { color: #3b82f6; font-weight: bold; }
        #viewer { flex-grow: 1; outline: none; }
        .label { font-size: 12px; margin-top: 10px; display: block; color: #aaa; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <strong>Rigging Controls</strong>
        <button onclick="addBone(true)">Add Root Bone</button>
        <button id="childBtn" onclick="addBone(false)" disabled>Add Child Bone</button>
        <span class="label">Transform Mode: [W] Move | [E] Rotate</span>
    </div>
    
    <div class="panel" id="props" style="display:none">
        <strong>Bone Dimensions</strong>
        <span class="label">Thickness</span>
        <input type="range" min="0.05" max="1" step="0.05" value="0.2" oninput="updateDimensions('radius', this.value)">
        <span class="label">Length</span>
        <input type="range" min="0.5" max="10" step="0.1" value="2" oninput="updateDimensions('length', this.value)">
    </div>

    <div id="hierarchy">
        <strong>Hierarchy</strong>
        <div id="tree"></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let selectedBone = null;
    let bonesMap = new Map(); // Link UI to 3D Objects

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 300) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 300, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040));
        scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

        // Controls
        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        // Pause orbit when dragging gizmo
        transform.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transform);

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') transform.setMode('translate');
            if (e.key.toLowerCase() === 'e') transform.setMode('rotate');
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    // --- Rigging Logic ---
    window.addBone = (isRoot) => {
        const geo = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
        const mat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
        const boneMesh = new THREE.Mesh(geo, mat);
        
        // Helper data
        boneMesh.userData = { 
            name: isRoot ? "Root" : "Bone_" + bonesMap.size,
            radius: 0.2,
            length: 2
        };

        if (isRoot) {
            scene.add(boneMesh);
            boneMesh.position.y = 1; // Start above floor
        } else if (selectedBone) {
            selectedBone.add(boneMesh);
            boneMesh.position.set(0, 2, 0); // Offset from parent
        }

        bonesMap.set(boneMesh.uuid, boneMesh);
        selectBone(boneMesh);
        renderHierarchyUI();
    };

    window.updateDimensions = (type, val) => {
        if (!selectedBone) return;
        const v = parseFloat(val);
        if (type === 'radius') selectedBone.scale.x = selectedBone.scale.z = v * 5;
        if (type === 'length') {
            selectedBone.scale.y = v / 2;
            // Adjust position so it grows from the base, not center
            selectedBone.children.forEach(c => c.position.y = 2 * (v/2));
        }
    };

    function selectBone(mesh) {
        selectedBone = mesh;
        transform.attach(mesh);
        document.getElementById('childBtn').disabled = false;
        document.getElementById('props').style.display = 'block';
        renderHierarchyUI();
    }

    function renderHierarchyUI() {
        const tree = document.getElementById('tree');
        tree.innerHTML = '';
        const roots = scene.children.filter(c => c.isMesh && !c.parent.isMesh);
        
        const ul = document.createElement('ul');
        roots.forEach(root => ul.appendChild(createList(root)));
        tree.appendChild(ul);
    }

    function createList(obj) {
        const li = document.createElement('li');
        li.innerText = obj.userData.name;
        if (selectedBone === obj) li.className = 'selected';
        
        li.onclick = (e) => {
            e.stopPropagation();
            selectBone(obj);
        };

        const children = obj.children.filter(c => c.isMesh);
        if (children.length > 0) {
            const subUl = document.createElement('ul');
            children.forEach(c => subUl.appendChild(createList(c)));
            li.appendChild(subUl);
        }
        return li;
    }
</script>

</body>
</html>
