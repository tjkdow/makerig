<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solid-Link Rig</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: -apple-system, sans-serif; overflow: hidden; }
        #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel { padding: 15px; border-bottom: 1px solid #333; }
        button { width: 100%; padding: 10px; margin: 4px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; }
        .active-mode { background: #3b82f6 !important; border-color: #fff; }
        #hierarchy-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .tree-ul { list-style: none; padding-left: 15px; margin: 5px 0; border-left: 1px solid #444; }
        .tree-li { cursor: pointer; padding: 6px; font-size: 13px; border-radius: 4px; color: #ccc; }
        .tree-selected { background: #3b82f6 !important; color: white; }
        #viewer { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <strong>Workflow</strong>
        <button id="drawBtn" onclick="toggleDrawMode()">Start Drawing</button>
        <div style="gap: 4px; display: flex;">
            <button id="moveBtn" onclick="setGizmo('translate')" class="active-mode">Move</button>
            <button id="rotBtn" onclick="setGizmo('rotate')">Rotate</button>
        </div>
        <button style="background:#4b1a1a" onclick="deleteSelected()">Delete</button>
    </div>
    <div id="hierarchy-container">
        <strong>Rig Stack</strong>
        <div id="tree-root"></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawMode = false, lastJoint = null, selectedObj = null;
    const SNAP_DIST = 1.0;

    const boneMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
    const highlightMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 0.5 });

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 260) / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 8, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 260, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5), new THREE.DirectionalLight(0xffffff, 1).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        transform.addEventListener('change', () => {
            if (transform.object && transform.object.userData.isJoint) {
                syncJoint(transform.object);
            }
        });

        transform.addEventListener('dragging-changed', (e) => {
            orbit.enabled = !e.value;
            if (!e.value && !isDrawMode && selectedObj?.userData.isJoint) {
                trySnap(selectedObj);
            }
        });

        scene.add(transform);
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        animate();
    }

    function syncJoint(joint) {
        // 1. Update the parent's bone to follow this joint
        if (joint.parent && joint.parent.userData.isJoint) {
            refreshBoneVisuals(joint.parent, joint);
        }
        // 2. Update this joint's bone to follow its children
        joint.children.forEach(child => {
            if (child.userData.isJoint) refreshBoneVisuals(joint, child);
        });
    }

    function refreshBoneVisuals(parent, child) {
        const pPos = new THREE.Vector3().setFromMatrixPosition(parent.matrixWorld);
        const cPos = new THREE.Vector3().setFromMatrixPosition(child.matrixWorld);
        const dist = pPos.distanceTo(cPos);

        parent.lookAt(cPos);
        parent.rotateX(Math.PI / 2);

        if (parent.userData.bone) {
            parent.userData.bone.scale.set(1, dist, 1);
        }
        
        // Ensure child stays at tip for visual consistency
        child.position.set(0, dist, 0);
        child.rotation.set(-Math.PI/2, 0, 0);
    }

    function select(obj) {
        // Reset old highlight
        if (selectedObj && selectedObj.userData.bone) selectedObj.userData.bone.material = boneMat;

        if (obj.userData.isBone) {
            selectedObj = obj.parent; // Select the Joint controlling this bone
        } else {
            selectedObj = obj;
        }

        if (selectedObj && selectedObj.userData.bone) {
            selectedObj.userData.bone.material = highlightMat;
        }

        transform.attach(selectedObj);
        updateUI();
    }

    function onPointerDown(e) {
        if (isDrawMode) {
            handleAirClick(e);
            return;
        }
        
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0) {
            const hit = hits.find(h => h.object.userData.isBone || h.object.parent?.userData.isJoint);
            if (hit) {
                const target = hit.object.userData.isBone ? hit.object : hit.object.parent;
                select(target);
            }
        } else {
            transform.detach();
            if (selectedObj && selectedObj.userData.bone) selectedObj.userData.bone.material = boneMat;
            selectedObj = null;
            updateUI();
        }
    }

    function trySnap(dragged) {
        let nearest = null;
        let minDist = SNAP_DIST;
        const dragPos = new THREE.Vector3().setFromMatrixPosition(dragged.matrixWorld);

        scene.traverse((obj) => {
            if (obj.userData.isJoint && obj !== dragged && !isChildOf(dragged, obj)) {
                const objPos = new THREE.Vector3().setFromMatrixPosition(obj.matrixWorld);
                const d = dragPos.distanceTo(objPos);
                if (d < minDist) { minDist = d; nearest = obj; }
            }
        });

        if (nearest) {
            const worldPos = new THREE.Vector3().setFromMatrixPosition(dragged.matrixWorld);
            nearest.add(dragged);
            dragged.position.copy(nearest.worldToLocal(worldPos));
            syncJoint(dragged);
            updateUI();
        }
    }

    function isChildOf(p, c) {
        let node = c.parent;
        while (node) { if (node === p) return true; node = node.parent; }
        return false;
    }

    function handleAirClick(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        
        let targetPos = new THREE.Vector3();
        if (lastJoint) {
            const worldPos = new THREE.Vector3().setFromMatrixPosition(lastJoint.matrixWorld);
            const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).negate(), worldPos);
            raycaster.ray.intersectPlane(plane, targetPos);
        } else {
            targetPos = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(10));
        }
        addNode(targetPos);
    }

    function addNode(worldPos) {
        const group = new THREE.Group();
        group.userData = { isJoint: true, name: 'J_' + (Math.floor(Math.random()*900)+100) };
        
        const jMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color:0xffffff}));
        group.add(jMesh);
        
        const bMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1), boneMat.clone());
        bMesh.geometry.translate(0, 0.5, 0);
        bMesh.userData.isBone = true;
        group.add(bMesh);
        group.userData.bone = bMesh;

        if (!lastJoint) {
            group.position.copy(worldPos);
            scene.add(group);
        } else {
            lastJoint.updateMatrixWorld();
            group.position.copy(lastJoint.worldToLocal(worldPos.clone()));
            lastJoint.add(group);
            syncJoint(lastJoint);
        }
        lastJoint = group;
        updateUI();
    }

    function updateUI() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        scene.children.filter(c => c.userData.isJoint && c.parent === scene).forEach(r => {
            const ul = document.createElement('ul');
            ul.className = 'tree-ul';
            ul.appendChild(buildTree(r));
            root.appendChild(ul);
        });
    }

    function buildTree(obj) {
        const li = document.createElement('li');
        li.className = 'tree-li' + (selectedObj === obj ? ' tree-selected' : '');
        li.innerText = "📍 " + obj.userData.name;
        li.onclick = (e) => { e.stopPropagation(); select(obj); };
        const sub = document.createElement('ul');
        sub.className = 'tree-ul';
        obj.children.filter(c => c.userData.isJoint).forEach(c => sub.appendChild(buildTree(c)));
        if(sub.children.length > 0) li.appendChild(sub);
        return li;
    }

    window.toggleDrawMode = () => {
        isDrawMode = !isDrawMode;
        orbit.enabled = !isDrawMode;
        document.getElementById('drawBtn').innerText = isDrawMode ? "Finish" : "Start Drawing";
        document.getElementById('drawBtn').classList.toggle('active-mode', isDrawMode);
        if (isDrawMode) { lastJoint = null; transform.detach(); }
    };

    window.setGizmo = (m) => transform.setMode(m);
    window.deleteSelected = () => { 
        if(selectedObj) { 
            selectedObj.removeFromParent(); 
            transform.detach(); 
            selectedObj = null;
            updateUI(); 
        } 
    };
    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
