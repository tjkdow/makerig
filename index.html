<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Rig Tool</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; background: #1a1a1a; color: #eee; }
        
        /* Sidebar Styles */
        #sidebar { 
            width: 300px; 
            background: #252525; 
            border-right: 1px solid #444; 
            display: flex; 
            flex-direction: column; 
        }
        
        .controls { padding: 15px; border-bottom: 1px solid #444; display: flex; flex-direction: column; gap: 10px; }
        
        button { 
            padding: 8px; 
            cursor: pointer; 
            background: #444; 
            color: white; 
            border: 1px solid #666; 
            border-radius: 4px;
        }
        
        button:hover { background: #555; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Hierarchy Tree */
        #hierarchy-container { padding: 15px; overflow-y: auto; flex-grow: 1; }
        ul { list-style-type: none; padding-left: 20px; }
        li { margin: 4px 0; cursor: pointer; padding: 4px; border-radius: 3px; position: relative; }
        li::before { content: '🦴'; margin-right: 5px; font-size: 0.8em; }
        
        .selected { background: #3b82f6 !important; color: white; }
        .joint-item:hover { background: #333; }

        /* Canvas Area (Placeholder) */
        #viewport { flex-grow: 1; display: flex; align-items: center; justify-content: center; color: #666; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="controls">
            <strong>Rig Controls</strong>
            <button onclick="addRootBone()">Add Root Bone</button>
            <button id="addChildBtn" onclick="addChildBone()" disabled>Add Child to Selected</button>
            <small id="selectionLabel">Selected: None</small>
        </div>
        
        <div id="hierarchy-container">
            <strong>Hierarchy</strong>
            <div id="tree-root"></div>
        </div>
    </div>

    <div id="viewport">
        <p>3D Viewport Placeholder</p>
    </div>

    <script>
        let skeleton = [];
        let selectedId = null;
        let boneCount = 0;

        function addRootBone() {
            const name = prompt("Bone Name:", `root_${boneCount++}`);
            if (!name) return;
            
            skeleton.push({ id: Date.now(), name: name, children: [] });
            renderHierarchy();
        }

        function addChildBone() {
            if (!selectedId) return;
            
            const name = prompt("Child Bone Name:", `joint_${boneCount++}`);
            if (!name) return;

            const parent = findBoneById(skeleton, selectedId);
            if (parent) {
                parent.children.push({ id: Date.now(), name: name, children: [] });
                renderHierarchy();
            }
        }

        // Helper to recursively find a bone
        function findBoneById(bones, id) {
            for (let bone of bones) {
                if (bone.id === id) return bone;
                if (bone.children.length > 0) {
                    const found = findBoneById(bone.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function selectBone(id, name) {
            selectedId = id;
            document.getElementById('selectionLabel').innerText = `Selected: ${name}`;
            document.getElementById('addChildBtn').disabled = false;
            renderHierarchy();
        }

        function renderHierarchy() {
            const container = document.getElementById('tree-root');
            container.innerHTML = '';
            const ul = document.createElement('ul');
            
            skeleton.forEach(bone => {
                ul.appendChild(createTreeItem(bone));
            });
            
            container.appendChild(ul);
        }

        function createTreeItem(bone) {
            const li = document.createElement('li');
            li.className = 'joint-item' + (selectedId === bone.id ? ' selected' : '');
            li.innerText = bone.name;
            
            li.onclick = (e) => {
                e.stopPropagation();
                selectBone(bone.id, bone.name);
            };

            if (bone.children.length > 0) {
                const subUl = document.createElement('ul');
                bone.children.forEach(child => {
                    subUl.appendChild(createTreeItem(child));
                });
                li.appendChild(subUl);
            }
            return li;
        }
    </script>
</body>
</html>
