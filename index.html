<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flat-Link Rigging</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; padding: 15px; z-index: 10; }
        button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; }
        .active { background: #3b82f6 !important; }
        #viewer { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Rig Controller</h3>
    <button id="drawBtn" onclick="toggleDraw()">Start Drawing</button>
    <button id="moveBtn" onclick="setMode('translate')" class="active">Move Joints</button>
    <button style="background:#4b1a1a" onclick="deleteJoint()">Delete Selected</button>
    <p style="font-size: 11px; color: #888; margin-top: 20px;">
        • Move Joints: Stretches links.<br>
        • Click Bone: Selects the "Start" joint.<br>
        • Drawing: Click in air to extend chain.
    </p>
</div>
<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawing = false, lastJoint = null, selectedJoint = null;
    let joints = []; // Store flat list of joints

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 260) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 260, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x222222));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5), new THREE.DirectionalLight(0xffffff, 1).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        // --- LIVE BONE UPDATE ---
        transform.addEventListener('change', () => {
            updateAllBones();
        });

        transform.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transform);

        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        animate();
    }

    function onPointerDown(e) {
        if (isDrawing) {
            createAirJoint(e);
            return;
        }

        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0) {
            const hit = hits.find(h => h.object.userData.isJoint || h.object.userData.isBone);
            if (hit) {
                // If bone is clicked, select its logical parent joint
                selectedJoint = hit.object.userData.isBone ? hit.object.userData.parentJoint : hit.object;
                transform.attach(selectedJoint);
            }
        } else {
            transform.detach();
            selectedJoint = null;
        }
    }

    function createAirJoint(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);

        let pos = new THREE.Vector3();
        if (lastJoint) {
            const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).negate(), lastJoint.position);
            ray.ray.intersectPlane(plane, pos);
        } else {
            pos = ray.ray.origin.clone().add(ray.ray.direction.clone().multiplyScalar(5));
        }

        const joint = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshStandardMaterial({color: 0xffffff}));
        joint.position.copy(pos);
        joint.userData.isJoint = true;
        joint.userData.parentJoint = lastJoint; // Logical link
        scene.add(joint);
        joints.push(joint);

        if (lastJoint) {
            createBone(lastJoint, joint);
        }

        lastJoint = joint;
        updateAllBones();
    }

    function createBone(pJoint, cJoint) {
        const geo = new THREE.CylinderGeometry(0.05, 0.05, 1);
        geo.translate(0, 0.5, 0); // Origin at bottom
        const bone = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x3b82f6}));
        bone.userData.isBone = true;
        bone.userData.parentJoint = pJoint;
        bone.userData.childJoint = cJoint;
        scene.add(bone);
        pJoint.userData.outBone = bone; // Link the bone to the parent for easy finding
    }

    function updateAllBones() {
        scene.traverse(obj => {
            if (obj.userData.isBone) {
                const p = obj.userData.parentJoint;
                const c = obj.userData.childJoint;
                
                const dist = p.position.distanceTo(c.position);
                obj.position.copy(p.position);
                obj.lookAt(c.position);
                obj.rotateX(Math.PI / 2);
                obj.scale.set(1, dist, 1);
            }
        });
    }

    window.toggleDraw = () => {
        isDrawing = !isDrawing;
        orbit.enabled = !isDrawing;
        if (isDrawing) { lastJoint = null; transform.detach(); }
        document.getElementById('drawBtn').classList.toggle('active', isDrawing);
    };

    window.setMode = (m) => {
        transform.setMode(m);
        document.getElementById('moveBtn').classList.add('active');
    };

    window.deleteJoint = () => {
        if (!selectedJoint) return;
        // Clean up bones linked to this joint
        const bonesToRemove = [];
        scene.traverse(obj => {
            if (obj.userData.isBone && (obj.userData.parentJoint === selectedJoint || obj.userData.childJoint === selectedObj)) {
                bonesToRemove.push(obj);
            }
        });
        bonesToRemove.forEach(b => b.removeFromParent());
        selectedJoint.removeFromParent();
        transform.detach();
        updateAllBones();
    };

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
