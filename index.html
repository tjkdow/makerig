<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Rig Maker</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: -apple-system, sans-serif; overflow: hidden; }
        #sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel { padding: 15px; border-bottom: 1px solid #333; }
        button { width: 100%; padding: 10px; margin: 4px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; }
        .active-mode { background: #3b82f6 !important; border-color: #fff; }
        
        #hierarchy-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .tree-ul { list-style: none; padding-left: 12px; margin: 5px 0; border-left: 1px solid #333; }
        .tree-li { cursor: pointer; padding: 6px; font-size: 12px; border-radius: 4px; }
        .tree-selected { background: #3b82f6 !important; }

        input[type="range"] { width: 100%; margin: 10px 0; }
        label { font-size: 11px; color: #888; text-transform: uppercase; }

        #viewer { flex-grow: 1; position: relative; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <strong>Tools</strong>
        <button id="drawBtn" onclick="toggleDrawMode()">Start Drawing</button>
        <div style="display: flex; gap: 4px;">
            <button id="moveBtn" onclick="setGizmo('translate')" class="active-mode">Move</button>
            <button id="rotBtn" onclick="setGizmo('rotate')">Rotate</button>
        </div>
    </div>

    <div id="prop-panel" class="panel" style="display:none;">
        <strong>Bone Properties</strong><br>
        <label>Thickness</label>
        <input type="range" id="thickIn" min="0.01" max="0.5" step="0.01" oninput="updateBoneScale()">
        <label>Length</label>
        <input type="range" id="lengthIn" min="0.1" max="10" step="0.1" oninput="updateBoneScale()">
    </div>

    <div id="hierarchy-container">
        <strong>Hierarchy</strong>
        <div id="tree-root"></div>
    </div>
</div>

<div id="viewer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawMode = false;
    let lastJoint = null;
    let selectedObj = null;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 280, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x222222));
        scene.add(new THREE.AmbientLight(0x606060), new THREE.PointLight(0xffffff, 100, 50).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        transform.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transform);

        // Click to Select in 3D
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isDrawMode) {
                handleAirClick(e);
                return;
            }
            // Raycast for selection
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if (intersects.length > 0) {
                const hit = intersects.find(i => i.object.userData.type);
                if (hit) selectObject(hit.object);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'w') setGizmo('translate');
            if (e.key === 'e') setGizmo('rotate');
        });

        animate();
    }

    window.setGizmo = (mode) => {
        transform.setMode(mode);
        document.getElementById('moveBtn').classList.toggle('active-mode', mode === 'translate');
        document.getElementById('rotBtn').classList.toggle('active-mode', mode === 'rotate');
    };

    window.toggleDrawMode = () => {
        isDrawMode = !isDrawMode;
        orbit.enabled = !isDrawMode;
        document.getElementById('drawBtn').innerText = isDrawMode ? "Done" : "Start Drawing";
        document.getElementById('drawBtn').classList.toggle('active-mode', isDrawMode);
        if (isDrawMode) { lastJoint = null; transform.detach(); }
    };

    function handleAirClick(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const pos = camera.position.clone().add(dir.multiplyScalar(10));
        addNode(pos);
    }

    function addNode(pos) {
        const joint = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color: 0xffffff}));
        joint.userData.type = 'joint';
        joint.userData.name = 'Joint';

        if (!lastJoint) {
            joint.position.copy(pos);
            scene.add(joint);
        } else {
            const startPos = new THREE.Vector3();
            lastJoint.getWorldPosition(startPos);
            const dist = startPos.distanceTo(pos);

            const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
            bone.geometry.translate(0, 0.5, 0); // Local origin at base
            bone.scale.set(1, dist, 1);
            bone.userData.type = 'bone';
            bone.userData.name = 'Bone';
            bone.userData.baseLen = 1;

            lastJoint.add(bone);
            lastJoint.lookAt(pos);
            lastJoint.rotateX(Math.PI / 2);
            bone.add(joint);
            joint.position.y = 1; // Relative to scaled bone
            joint.rotation.x = -Math.PI / 2;
        }
        lastJoint = joint;
        updateUI();
    }

    function selectObject(obj) {
        selectedObj = obj;
        transform.attach(obj);
        const isBone = obj.userData.type === 'bone';
        document.getElementById('prop-panel').style.display = isBone ? 'block' : 'none';
        if (isBone) {
            document.getElementById('thickIn').value = obj.scale.x / 10;
            document.getElementById('lengthIn').value = obj.scale.y;
        }
        updateUI();
    }

    window.updateBoneScale = () => {
        if (!selectedObj || selectedObj.userData.type !== 'bone') return;
        const t = parseFloat(document.getElementById('thickIn').value) * 10;
        const l = parseFloat(document.getElementById('lengthIn').value);
        selectedObj.scale.set(t, l, t);
    };

    function updateUI() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        const roots = scene.children.filter(c => c.userData.type === 'joint');
        const ul = document.createElement('ul');
        ul.className = 'tree-ul';
        roots.forEach(r => ul.appendChild(buildTree(r)));
        root.appendChild(ul);
    }

    function buildTree(obj) {
        const li = document.createElement('li');
        li.className = 'tree-li' + (selectedObj === obj ? ' tree-selected' : '');
        li.innerText = (obj.userData.type === 'joint' ? "⚪ " : "🦴 ") + obj.userData.name;
        li.onclick = (e) => { e.stopPropagation(); selectObject(obj); };
        if (obj.children.length > 0) {
            const sub = document.createElement('ul');
            sub.className = 'tree-ul';
            obj.children.filter(c => c.userData.type).forEach(c => sub.appendChild(buildTree(c)));
            li.appendChild(sub);
        }
        return li;
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
