<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snap-Parent Rigging</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: -apple-system, sans-serif; overflow: hidden; }
        #sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .panel { padding: 15px; border-bottom: 1px solid #333; }
        button { width: 100%; padding: 10px; margin: 4px 0; cursor: pointer; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; }
        button:hover { background: #333; }
        .active-mode { background: #3b82f6 !important; border-color: #fff; }
        
        #hierarchy-container { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .tree-ul { list-style: none; padding-left: 15px; margin: 5px 0; border-left: 1px solid #444; }
        .tree-li { cursor: pointer; padding: 6px; font-size: 13px; border-radius: 4px; color: #ccc; }
        .tree-selected { background: #3b82f6 !important; color: white; }

        label { font-size: 11px; color: #888; text-transform: uppercase; }
        #viewer { flex-grow: 1; position: relative; }
        #snap-toast { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #3b82f6; color: white; padding: 10px 20px; border-radius: 20px;
            font-size: 14px; font-weight: bold; display: none; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <strong>Tools</strong>
        <button id="drawBtn" onclick="toggleDrawMode()">Start Drawing</button>
        <div style="display: flex; gap: 4px;">
            <button id="moveBtn" onclick="setGizmo('translate')" class="active-mode">Move</button>
            <button id="rotBtn" onclick="setGizmo('rotate')">Rotate</button>
        </div>
        <button style="background:#631c1c" onclick="deleteSelected()">Delete</button>
    </div>

    <div id="hierarchy-container">
        <strong>Hierarchy</strong>
        <div id="tree-root"></div>
    </div>
</div>

<div id="viewer">
    <div id="snap-toast">Snapped to Parent!</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawMode = false, lastBone = null, selectedObj = null;
    const SNAP_THRESHOLD = 0.8; 

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 280) / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 280, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x222222, 0x222222));
        scene.add(new THREE.AmbientLight(0x606060), new THREE.PointLight(0xffffff, 200).translateY(10));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        // --- SNAP LOGIC ---
        transform.addEventListener('dragging-changed', (e) => {
            orbit.enabled = !e.value;
            // When user releases the joint, check for snap
            if (!e.value && selectedObj && selectedObj.userData.isJoint) {
                checkForSnap(selectedObj);
            }
        });

        scene.add(transform);
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        animate();
    }

    function checkForSnap(draggedJoint) {
        let nearest = null;
        let minDist = SNAP_THRESHOLD;
        const dragPos = new THREE.Vector3();
        draggedJoint.getWorldPosition(dragPos);

        scene.traverse((obj) => {
            if (obj.userData.isJoint && obj !== draggedJoint && !isDescendant(draggedJoint, obj)) {
                const objPos = new THREE.Vector3();
                obj.getWorldPosition(objPos);
                const d = dragPos.distanceTo(objPos);
                if (d < minDist) {
                    minDist = d;
                    nearest = obj;
                }
            }
        });

        if (nearest) {
            reparentJoint(draggedJoint, nearest);
            showToast();
        }
    }

    function isDescendant(parent, child) {
        let node = child.parent;
        while (node) {
            if (node === parent) return true;
            node = node.parent;
        }
        return false;
    }

    function reparentJoint(child, newParent) {
        const worldPos = new THREE.Vector3();
        child.getWorldPosition(worldPos);

        // 1. Move in Hierarchy
        newParent.add(child);
        
        // 2. Calculate Local Position relative to parent
        const localPos = newParent.worldToLocal(worldPos);
        child.position.copy(localPos);

        // 3. Align Parent to point at Child to form the Bone
        const targetPos = new THREE.Vector3();
        child.getWorldPosition(targetPos);
        
        newParent.lookAt(targetPos);
        newParent.rotateX(Math.PI / 2);

        // 4. Update the visual bone of the parent
        const dist = localPos.length();
        const boneMesh = newParent.userData.bone;
        if (boneMesh) {
            boneMesh.scale.set(1, dist, 1);
            child.position.set(0, dist, 0); // Snap to tip axis
            child.rotation.x = -Math.PI / 2; // Keep children aligned
        }

        updateUI();
    }

    function onPointerDown(e) {
        if (isDrawMode) { handleAirClick(e); return; }
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);
        if (intersects.length > 0) {
            const hit = intersects.find(i => i.object.userData.isBone || i.object.userData.isJoint);
            if (hit) {
                selectedObj = hit.object.userData.isBone ? hit.object.parent : hit.object;
                transform.attach(selectedObj);
                updateUI();
            }
        }
    }

    function addBone(pos) {
        const group = new THREE.Group();
        group.userData.isJoint = true;
        group.userData.name = 'Joint_' + (Math.floor(Math.random()*900)+100);
        
        const jMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color: 0xffffff}));
        group.add(jMesh);

        const bMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
        bMesh.geometry.translate(0, 0.5, 0);
        bMesh.userData.isBone = true;
        group.add(bMesh);
        group.userData.bone = bMesh;

        if (!lastBone) {
            group.position.copy(pos);
            scene.add(group);
        } else {
            reparentJoint(group, lastBone);
        }
        lastBone = group;
        updateUI();
    }

    function handleAirClick(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const vector = new THREE.Vector3(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1, 0.5).unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        addBone(camera.position.clone().add(dir.multiplyScalar(10)));
    }

    function updateUI() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        const roots = scene.children.filter(c => c.userData.isJoint);
        const ul = document.createElement('ul');
        ul.className = 'tree-ul';
        roots.forEach(r => ul.appendChild(buildTree(r)));
        root.appendChild(ul);
    }

    function buildTree(obj) {
        const li = document.createElement('li');
        li.className = 'tree-li' + (selectedObj === obj ? ' tree-selected' : '');
        li.innerText = "📍 " + obj.userData.name;
        li.onclick = (e) => { e.stopPropagation(); selectedObj = obj; transform.attach(obj); updateUI(); };
        const sub = document.createElement('ul');
        sub.className = 'tree-ul';
        obj.children.filter(c => c.userData.isJoint).forEach(c => sub.appendChild(buildTree(c)));
        if(sub.children.length > 0) li.appendChild(sub);
        return li;
    }

    function showToast() {
        const t = document.getElementById('snap-toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1500);
    }

    window.toggleDrawMode = () => {
        isDrawMode = !isDrawMode;
        orbit.enabled = !isDrawMode;
        document.getElementById('drawBtn').classList.toggle('active-mode', isDrawMode);
        if (isDrawMode) { lastBone = null; transform.detach(); }
    };

    window.setGizmo = (m) => transform.setMode(m);
    window.deleteSelected = () => { if(selectedObj) { selectedObj.removeFromParent(); transform.detach(); updateUI(); } };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
