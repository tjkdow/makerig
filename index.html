<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal 3D Rig Tool</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #111; color: #eee; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* Responsive Layout: Sidebar becomes Top bar on small screens */
        #sidebar { 
            width: 280px; background: #222; border-right: 1px solid #444; 
            display: flex; flex-direction: column; z-index: 10; 
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #444; }
            #hierarchy { display: none; } /* Hide hierarchy on mobile to save space */
        }

        .panel { padding: 12px; border-bottom: 1px solid #444; }
        button { 
            width: 100%; padding: 12px; margin: 4px 0; cursor: pointer; 
            background: #333; color: white; border: 1px solid #555; 
            border-radius: 8px; font-weight: 600; -webkit-tap-highlight-color: transparent;
        }
        .active-btn { background: #3b82f6 !important; border-color: #fff; }
        
        #viewer { flex-grow: 1; position: relative; touch-action: none; }
        #overlay { 
            position: absolute; top: 10px; left: 10px; pointer-events: none; 
            background: rgba(0,0,0,0.6); padding: 8px; border-radius: 6px; font-size: 12px; 
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <button id="drawBtn" onclick="toggleDrawMode()">Start Drawing</button>
        <div style="display: flex; gap: 5px;">
            <button onclick="setGizmo('translate')">Move</button>
            <button onclick="setGizmo('rotate')">Rotate</button>
        </div>
    </div>
    <div id="hierarchy" class="panel">
        <strong>Hierarchy</strong>
        <div id="tree" style="font-size: 12px; margin-top: 10px;"></div>
    </div>
</div>

<div id="viewer">
    <div id="overlay">Tap grid to place joints (Air Mode)</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    let scene, camera, renderer, orbit, transform;
    let isDrawMode = false;
    let lastJoint = null;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
        scene.add(new THREE.AmbientLight(0x404040), new THREE.DirectionalLight(0xffffff, 1));

        orbit = new OrbitControls(camera, renderer.domElement);
        transform = new TransformControls(camera, renderer.domElement);
        
        transform.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transform);

        // Resize Listener
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Touch/Mouse Click
        renderer.domElement.addEventListener('pointerdown', handleInput);

        animate();
    }

    window.setGizmo = (mode) => transform.setMode(mode);

    window.toggleDrawMode = () => {
        isDrawMode = !isDrawMode;
        orbit.enabled = !isDrawMode;
        const btn = document.getElementById('drawBtn');
        btn.innerText = isDrawMode ? "Finish & Link" : "Start Drawing";
        btn.className = isDrawMode ? "active-btn" : "";
        if (isDrawMode) { lastJoint = null; transform.detach(); }
    };

    function handleInput(e) {
        if (!isDrawMode) return;
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

        const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const pos = camera.position.clone().add(dir.multiplyScalar(10));
        
        createNode(pos);
    }

    function createNode(pos) {
        const joint = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color:0xffffff}));
        if (!lastJoint) {
            joint.position.copy(pos);
            scene.add(joint);
        } else {
            const start = new THREE.Vector3();
            lastJoint.getWorldPosition(start);
            const dist = start.distanceTo(pos);
            const bone = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, dist), new THREE.MeshStandardMaterial({color:0x3b82f6}));
            bone.geometry.translate(0, dist/2, 0);
            lastJoint.add(bone);
            lastJoint.lookAt(pos);
            lastJoint.rotateX(Math.PI/2);
            bone.add(joint);
            joint.position.y = dist;
            joint.rotation.x = -Math.PI/2;
        }
        lastJoint = joint;
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
